server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Auth - all /auth/* goes to gateway
    location /auth/ {
        proxy_pass http://api-gateway:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Deployments
    location /deployments/ {
        proxy_pass http://api-gateway:8000/deployments/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Repos
    location /repos/ {
        proxy_pass http://api-gateway:8000/repos/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Builds
    location /builds/ {
        proxy_pass http://api-gateway:8000/builds/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Monitoring
    location /monitoring/ {
        proxy_pass http://api-gateway:8000/monitoring/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Scanner
    location /scanner/ {
        proxy_pass http://api-gateway:8000/scanner/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Registry
    location /registry/ {
        proxy_pass http://api-gateway:8000/registry/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # Health check (gateway's own endpoint, not proxied)
    location = /health {
        proxy_pass http://api-gateway:8000/health;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
