version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minipaas
      POSTGRES_PASSWORD: minipaas
      POSTGRES_DB: minipaas
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minipaas"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  app-management:
    build: ./services/app-management
    ports:
      - "8002:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  build-service:
    build: ./services/build-service
    ports:
      - "8003:8002"
    environment:
      - DATABASE_URL=postgresql://minipaas:minipaas@postgres:5432/minipaas
      - AUTH_SERVICE_URL=http://auth-service:8000
      - SCANNER_SERVICE_URL=http://security-scanner:8000
      - REGISTRY_SERVICE_URL=http://registry-service:8005
    env_file: .env
    depends_on:
      - rabbitmq
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  deployment-service:
    build: ./services/deployment-service
    ports:
      - "8004:8000"
    env_file: .env
    depends_on:
      - rabbitmq

  registry:
    image: registry:2
    ports:
      - "5000:5000"

  registry-service:
    build: ./services/registry-service
    ports:
      - "8007:8000"
    environment:
      - DATABASE_URL=postgresql://minipaas:minipaas@postgres:5432/minipaas
      - REGISTRY_HOST=localhost:5000
      - REGISTRY_URL=http://localhost:5000
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - registry
      - postgres

  monitoring-service:
    build: ./services/monitoring-service
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://minipaas:minipaas@postgres:5432/minipaas
    env_file: .env
    depends_on:
      - rabbitmq
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  security-scanner:
    build: ./services/security-scanner
    ports:
      - "8006:8000"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy_cache:/root/.cache/trivy
    depends_on:
      - rabbitmq

  deployer-service:
    build: ./services/deployer-service
    ports:
      - "8008:8000"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - auth-service
      - build-service
      - registry-service

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - auth-service
      - app-management
      - deployer-service
      - deployment-service
      - monitoring-service

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
      - auth-service
      - deployer-service
      - monitoring-service
    networks:
      - default
    restart: on-failure

volumes:
  postgres_data:
  trivy_cache:

networks:
  default:
    driver: bridge