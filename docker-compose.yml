version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cloudoku
      POSTGRES_PASSWORD: cloudoku
      POSTGRES_DB: cloudoku
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudoku"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - rabbitmq
      - redis

  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  app-management:
    build: ./services/app-management
    ports:
      - "8002:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  build-service:
    build: ./services/build-service
    ports:
      - "8003:8000"
    env_file: .env
    depends_on:
      - rabbitmq
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  deployment-service:
    build: ./services/deployment-service
    ports:
      - "8004:8000"
    env_file: .env
    depends_on:
      - rabbitmq

  monitoring-service:
    build: ./services/monitoring-service
    ports:
      - "8005:8000"
    env_file: .env
    depends_on:
      - rabbitmq

  security-scanner:
    build: ./services/security-scanner
    ports:
      - "8006:8000"
    env_file: .env
    depends_on:
      - rabbitmq

volumes:
  postgres_data:
