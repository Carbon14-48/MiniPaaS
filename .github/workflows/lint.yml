name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ruff:
    name: Ruff check
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          src: services/

  ts:
    name: ESLint + tsc
    needs: ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx eslint src/ --max-warnings=0
      - run: npx tsc --noEmit

  sonarcloud:
    name: SonarCloud
    needs: ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run test:coverage
        working-directory: frontend
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps & run coverage
        run: |
          python -m venv /tmp/venv
          . /tmp/venv/bin/activate
          for req in services/*/requirements.txt; do
            pip install --quiet -r "$req" 2>/dev/null || true
          done
          pip install --quiet pytest-cov
          pytest services/ \
            --cov=services/ \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --ignore=services/security-scanner/tests \
            -o "addopts=" \
            || echo "Some python tests failed, continuing for coverage"
      - uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.qualitygate.wait=false
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-docker:
    name: Docker lint
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        run: |
          for f in services/*/Dockerfile frontend/Dockerfile; do
            echo "=== $f ==="
            docker run --rm -i ghcr.io/hadolint/hadolint < "$f"
          done
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          quiet: true

  build:
    name: Build images
    needs: lint-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  scan-images:
    name: Trivy + Dockle
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trivy scan all images
        run: |
          failed=0
          for img in $(docker images --format "{{.Repository}}" | grep minipaas); do
            echo "=== Scanning $img ==="
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              -v /tmp/trivy-cache:/root/.cache/trivy \
              aquasec/trivy image \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              "$img" || failed=1
          done
          [ "$failed" -eq 0 ] || exit 1

      - name: Dockle scan all images
        run: |
          for img in $(docker images --format "{{.Repository}}" | grep minipaas); do
            echo "=== Dockle $img ==="
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              goodwithtech/dockle \
              --exit-code 1 \
              "$img" || true
          done


