apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-service
  namespace: minipaas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-service
  template:
    metadata:
      labels:
        app: monitoring-service
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: monitoring-service
        image: ghcr.io/carbon14-48/minipaas-monitoring-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8006
        envFrom:
        - configMapRef:
            name: minipaas-config
        - secretRef:
            name: minipaas-secret
        volumeMounts:
        - name: docker-socket
          mountPath: /var/run/docker.sock
        livenessProbe:
          tcpSocket:
            port: 8006
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 8006
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
          type: Socket
